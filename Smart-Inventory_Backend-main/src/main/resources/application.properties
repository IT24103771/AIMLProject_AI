# ====================== Server ======================
server.port=8080

# ====================== Database ======================
spring.datasource.url=jdbc:mysql://localhost:3306/d_ds
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Optional: Better SQL formatting (easier to read)
spring.jpa.properties.hibernate.format_sql=true

# ====================== Security ======================
# Hide the annoying generated password warning
logging.level.org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration=OFF

# ====================== JWT ======================
jwt.secret=your_very_long_secret_key_123456789012345678901234567890
jwt.expiration-ms=86400000

# ====================== Application Settings ======================
app.max-login-attempts=3

# ====================== Logging ======================
# Show SQL with parameters (very useful during development)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Optional: Reduce noise from Tomcat and Hibernate
logging.level.org.apache.catalina=ERROR
logging.level.org.hibernate=ERROR